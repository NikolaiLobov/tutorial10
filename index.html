<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Model Extraction</title>
    <style>
        body {
            background-color: #f9f9f9;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        .response {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .loading {
            color: #007bff;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>LLM Model Extraction</h2>
        <textarea placeholder="Enter your query here..."></textarea>
        <button onclick="submitQuery()">Submit</button>
        <div class="response" id="response"></div>
    </div>
</body>
</html>

<script>
    async function submitQuery() {
        const input = document.querySelector('textarea');
        const responseDiv = document.getElementById('response');
        const apiEndpoint = 'https://api.example.com/llm'; // Replace with your actual API endpoint

        if (input.value.trim() === '') {
            responseDiv.textContent = 'Please enter a query.';
            return;
        }

        responseDiv.textContent = 'Loading...';
        try {
            const response = await fetch(apiEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ query: input.value.trim() })
            });

            if (!response.ok) {
                throw new Error(`API Error: ${response.status}`);
            }

            const data = await response.json();
            responseDiv.textContent = data.response || 'No response received.';
        } catch (error) {
            responseDiv.textContent = `Error: ${error.message}`;
        }
    }
</script>
